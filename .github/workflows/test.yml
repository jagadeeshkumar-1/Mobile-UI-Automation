name: Mobile UI Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_group:
        description: 'Test group to run'
        required: false
        default: 'Smoke'
        type: choice
        options:
          - Smoke
          - Regression
          - All

permissions:
  contents: read
  checks: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium and UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2
          appium -v

      - name: Download APK
        run: |
          mkdir -p src/test/resources/apps
          curl -L -o src/test/resources/apps/mda-2.2.0-25.apk \
            https://github.com/saucelabs/my-demo-app-android/releases/download/2.2.0/mda-2.2.0-25.apk
          ls -lh src/test/resources/apps/mda-2.2.0-25.apk

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Resolve test group
        id: group
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "group=Smoke" >> "$GITHUB_OUTPUT"
            echo "PR build — forcing group: Smoke"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "group=${{ inputs.test_group }}" >> "$GITHUB_OUTPUT"
            echo "Manual trigger — group: ${{ inputs.test_group }}"
          else
            echo "group=Smoke" >> "$GITHUB_OUTPUT"
            echo "Push build — running Smoke"
          fi

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Create AVD and boot emulator
        run: |
          echo "y" | sdkmanager "system-images;android-30;google_apis;x86_64"
          echo "no" | avdmanager create avd -n test_avd -k "system-images;android-30;google_apis;x86_64" --device "pixel_4" --force
          nohup $ANDROID_HOME/emulator/emulator -avd test_avd -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -skin 1080x2280 &
          echo "Waiting for emulator to boot..."
          adb wait-for-device
          adb shell 'while [[ -z $(getprop sys.boot_completed) ]]; do sleep 2; done'
          adb shell wm size 1080x2280
          adb shell wm density 440
          adb shell input keyevent 82
          echo "Emulator ready"

      - name: Start Appium
        run: |
          nohup appium --log-level error > /tmp/appium.log 2>&1 &
          echo $! > /tmp/appium.pid
          sleep 5
          echo "Appium started (PID $(cat /tmp/appium.pid))"

      - name: Run tests
        timeout-minutes: 10
        run: |
          GROUP=${{ steps.group.outputs.group }}
          if [ "${GROUP}" = "All" ]; then
            mvn clean test -B --no-transfer-progress || true
          else
            mvn clean test -Dgroups="${GROUP}" -B --no-transfer-progress || true
          fi

      - name: Stop Appium and emulator
        if: always()
        run: |
          kill $(cat /tmp/appium.pid) 2>/dev/null || true
          adb emu kill 2>/dev/null || true

      - name: Publish test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        timeout-minutes: 3
        with:
          report_paths: target/surefire-reports/junitreports/*.xml
          include_passed: true
          check_name: TestNG Results

      - name: Install Allure CLI
        if: always()
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz | tar -xz
          echo "$PWD/allure-2.27.0/bin" >> "$GITHUB_PATH"

      - name: Generate Allure report (single file)
        if: always()
        run: allure generate target/allure-results --single-file -o allure-report --clean

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
