name: Mobile UI Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_group:
        description: 'Test group to run'
        required: false
        default: 'Smoke'
        type: choice
        options:
          - Smoke
          - Regression
          - All

permissions:
  contents: read
  checks: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium and UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2
          appium -v

      - name: Download APK
        run: |
          mkdir -p src/test/resources/apps
          curl -L -o src/test/resources/apps/mda-2.2.0-25.apk \
            https://github.com/saucelabs/my-demo-app-android/releases/download/2.2.0/mda-2.2.0-25.apk
          ls -lh src/test/resources/apps/mda-2.2.0-25.apk

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Resolve test group
        id: group
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "group=Smoke" >> "$GITHUB_OUTPUT"
            echo "PR build — forcing group: Smoke"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "group=${{ inputs.test_group }}" >> "$GITHUB_OUTPUT"
            echo "Manual trigger — group: ${{ inputs.test_group }}"
          else
            echo "group=Smoke" >> "$GITHUB_OUTPUT"
            echo "Push build — running Smoke"
          fi

      - name: Run tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          profile: pixel_4
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -skin 1080x2280
          disable-animations: true
          script: |
            appium --log-level error &
            sleep 5
            adb wait-for-device
            adb shell wm size 1080x2280
            adb shell wm density 440
            adb shell input keyevent 82
            sleep 3
            GROUP=${{ steps.group.outputs.group }}
            MVN_ARGS="-B --no-transfer-progress"
            if [ "${GROUP}" = "All" ]; then mvn clean test ${MVN_ARGS} || true; else mvn clean test -Dgroups="${GROUP}" ${MVN_ARGS} || true; fi

      - name: Publish test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: TestNG Results
          path: target/surefire-reports/junitreports/*.xml
          reporter: java-junit

      - name: Install Allure CLI
        if: always()
        run: |
          curl -sL https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz | tar -xz
          echo "$PWD/allure-2.27.0/bin" >> "$GITHUB_PATH"

      - name: Generate Allure report (single file)
        if: always()
        run: allure generate target/allure-results --single-file -o allure-report --clean

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
